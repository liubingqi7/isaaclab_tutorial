project:
  name: isaaclab_tutorial
  purpose: >
    Reader-facing companion repository for organizing, mapping, running, and
    testing the Isaac Lab related source code referenced by the book.
  book: "具身智能仿真实战：构建、训练与部署.pdf"
  focus_chapters:
    - chapter: 7
      title: "Isaac Lab: platform, installation, structure"
      pdf_pages: "118-126"
    - chapter: 8
      title: "Isaac Lab workflow: environment construction and RL training"
      pdf_pages: "127-152"
    - chapter: 9
      title: "Humanoid locomotion and whole-body motion tracking"
      pdf_pages: "153-184"
    - chapter: 10
      title: "Sim-to-real validation and Unitree deployment"
      pdf_pages: "185-199"

local_workspace:
  role: management_only
  initial_state:
    date: "2026-06-22"
    git_repository: false
    files:
      - "具身智能仿真实战：构建、训练与部署.pdf"

remote_workstation:
  host: "liubingqi@192.168.2.16"
  conda_env: "env_isaaclab_2.3_lbq"
  note: "Use for source code checkout, runtime validation, and compute."
  paths:
    isaaclab: "/home/liubingqi/lbq/IsaacLab"
    isaaclab_clean: "/home/liubingqi/lbq/isaaclab_tutorial_sources/IsaacLab-v2.3.0"
    isaaclab_tutorial_sources: "/home/liubingqi/lbq/isaaclab_tutorial_sources"
    humanoid_lab: "/home/liubingqi/lbq/humanoid-lab"
    unitree_rl_lab: "/home/liubingqi/lbq/unitree_rl_lab"
    unitree_mujoco: "/home/liubingqi/lbq/unitree_mujoco"
    gmr: "/home/liubingqi/lbq/humanoid-lab/Retargeting/GMR"

upstream_sources:
  isaaclab:
    url: "https://github.com/isaac-sim/IsaacLab"
    book_target: "v2.3.0"
    book_paths:
      - "scripts/demos/multi_asset.py"
      - "scripts/tutorials/02_scene/create_scene.py"
      - "scripts/reinforcement_learning/rsl_rl/train.py"
      - "source/isaaclab_tasks/isaaclab_tasks/manager_based/locomotion/velocity/config/g1"
  rsl_rl:
    url: "https://github.com/leggedrobotics/rsl_rl"
    role: "RL algorithm library used by Isaac Lab training scripts."
  unitree_rl_lab:
    url: "https://github.com/unitreerobotics/unitree_rl_lab"
    book_paths:
      - "source/unitree_rl_lab/unitree_rl_lab/tasks/mimic"
      - "deploy"
      - "deploy/robots/g1_29dof/src/State_Mimic.cpp"
  beyondmimic_tracking:
    url: "https://github.com/HybridRobotics/whole_body_tracking"
    role: "BeyondMimic motion tracking implementation referenced by chapter 9."
  gmr:
    url: "https://github.com/YanjieZe/GMR"
    role: "General Motion Retargeting implementation for motion data preparation."
  unitree_mujoco:
    url: "https://github.com/unitreerobotics/unitree_mujoco"
    book_paths:
      - "simulate"
      - "simulate/src/main.cc"
      - "simulate/src/unitree_sdk2_bridge.h"
  unitree_sdk2:
    url: "https://github.com/unitreerobotics/unitree_sdk2"
    role: "DDS communication dependency for Unitree MuJoCo and deploy."

